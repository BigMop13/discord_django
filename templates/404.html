{% load static %}<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Not found</title>
  <link rel="icon" href="{% static 'img/favicon.svg' %}" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <div class="error-page">
    <div class="error-card">
      <i class="bi bi-compass display-3 text-primary"></i>
      <p class="error-code mt-2">404</p>
      <h1 class="error-title">This channel doesn't exist</h1>
      <p class="error-text">The page you tried to reach is offline, deleted, or never existed.</p>
      <a href="/" class="btn btn-primary"><i class="bi bi-house-door me-1"></i>Take me home</a>
    </div>
  </div>
</body>
</html>

{% load static %}<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 - Server error</title>
  <link rel="icon" href="{% static 'img/favicon.svg' %}" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
  <div class="error-page">
    <div class="error-card">
      <i class="bi bi-cone-striped display-3 text-warning"></i>
      <p class="error-code mt-2">500</p>
      <h1 class="error-title">Something broke on our end</h1>
      <p class="error-text">A gremlin got into the server. The team has been notified.</p>
      <a href="/" class="btn btn-primary"><i class="bi bi-arrow-clockwise me-1"></i>Try again</a>
    </div>
  </div>
</body>
</html>
